                - name: user_id
                  in: path
                  type: string
                  required: true
                  description: The ID of a Censys user. You can obtain a user's ID by listing members of an organization.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: v3-accountmanagement-update-org-member
              method: PATCH
              description: Censys Update a Member's Roles in an Organization
