naftiko: 1.0.0-alpha2
info:
  label: Censys Platform — Account Management
  description: 'Censys Platform — Account Management. 11 operation(s). Lead operation: Censys Get Organization Details. Self-contained Naftiko capability covering one Censys business surface.'
  tags:
    - Censys
    - Platform
    - Account Management
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
  - namespace: env
    keys:
      CENSYS_PERSONAL_ACCESS_TOKEN: CENSYS_PERSONAL_ACCESS_TOKEN
capability:
  consumes:
    - type: http
      namespace: platform-account-management
      baseUri: https://api.platform.censys.io
      description: Censys Platform — Account Management business capability. Self-contained, no shared references.
      authentication:
        type: bearer
        token: '{{env.CENSYS_PERSONAL_ACCESS_TOKEN}}'
      resources:
        - name: v3-accounts-organizations-organization-id
          path: /v3/accounts/organizations/{organization_id}
          operations:
            - name: v3-accountmanagement-org-details
              method: GET
              description: Censys Get Organization Details
              inputParameters:
                - name: organization_id
                  in: path
                  type: string
                  required: true
                  description: The ID of a Censys organization. See the [Getting Started docs](https://docs.censys.com/reference/get-started#step-3-find-and-use-your-organization-id-optional) for more information.
                - name: include_member_counts
                  in: query
                  type: boolean
                  required: false
                  description: Whether to include how many members are in this organization, split by role.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: v3-accounts-organizations-organization-id-audit-log-events
          path: /v3/accounts/organizations/{organization_id}/audit-log-events
          operations:
            - name: v3-accountmanagement-org-audit-log-events
              method: GET
              description: Censys List Audit Log Events
              inputParameters:
                - name: organization_id
                  in: path
                  type: string
                  required: true
                  description: The ID of a Censys organization. See the [Getting Started docs](https://docs.censys.com/reference/get-started#step-3-find-and-use-your-organization-id-optional) for more information.
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: Amount of events to return per page.
                - name: page_token
                  in: query
                  type: string
                  required: false
                  description: Page token for the requested page of audit log events.
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: Only return events that occurred after this time. This value must be on or after 2026-01-01T00:00:00Z. If not provided, will default to the earliest possible date.
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: Only return events that occurred before this time. This value must not be in the future. If not provided, it defaults to the current time.
                - name: event_type
                  in: query
                  type: string
                  required: false
                  description: Only return events of this type. This field is deprecated and will be removed in a future version. Use event_types instead.
                - name: event_types
                  in: query
                  type:
                    - array
                    - "null"
                  required: false
                  description: Only return events of these types.
                - name: exclude_event_types
                  in: query
                  type:
                    - array
                    - "null"
                  required: false
                  description: Exclude events of these types.
                - name: user_email
                  in: query
                  type: string
                  required: false
                  description: Only return events performed by this user.
                - name: order_by
                  in: query
                  type: string
                  required: false
                  description: Order events by this field.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: v3-accounts-organizations-organization-id-credits
          path: /v3/accounts/organizations/{organization_id}/credits
          operations:
            - name: v3-accountmanagement-org-credits
              method: GET
              description: Censys Get Organization Credit Balance
              inputParameters:
                - name: organization_id
                  in: path
                  type: string
                  required: true
                  description: The ID of a Censys organization. See the [Getting Started docs](https://docs.censys.com/reference/get-started#step-3-find-and-use-your-organization-id-optional) for more information.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: v3-accounts-organizations-organization-id-credits-usage
          path: /v3/accounts/organizations/{organization_id}/credits/usage
          operations:
            - name: v3-accountmanagement-org-credits-usage
              method: GET
              description: Censys Get Organization Credit Usage
              inputParameters:
                - name: organization_id
                  in: path
                  type: string
                  required: true
                  description: The ID of a Censys organization. See the [Getting Started docs](https://docs.censys.com/reference/get-started#step-3-find-and-use-your-organization-id-optional) for more information.
                - name: date
                  in: query
                  type: string
                  required: false
                  description: The date for the credit usage report in YYYY-MM-DD format (e.g., 2025-11-06). This field is deprecated and will be removed in a future version. Use start_date and end_date instead. The date must be on or after 2025-01-01 (the earliest date available for credit usage reports).
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: The start date for the credit usage report in YYYY-MM-DD format (e.g., 2025-11-01). Must be on or after 2025-01-01 (the earliest date available for credit usage reports).
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: The end date for the credit usage report in YYYY-MM-DD format (e.g., 2025-12-01). If omitted, will default to today's date. The date range (end_date - start_date) cannot exceed 365 days (1 year).
                - name: granularity
                  in: query
                  type: string
                  required: true
                  description: Whether to break down credit usage on a daily or monthly basis.
                - name: include_consumer_breakdown
                  in: query
                  type: boolean
                  required: false
                  description: Whether to include a breakdown of individual users' consumption in the credit usage report.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
