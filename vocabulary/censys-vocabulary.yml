capability:
  workflows:
    - name: Censys Asset Graph — Asset Graphs
      file: capabilities/asset-graph-asset-graphs.yaml
      description: 'Censys Asset Graph — Asset Graphs. 4 operation(s). Lead operation: Censys List Asset Graphs. Self-contained Naftiko capability covering one Censys business surface.'
      apis:
        - Censys
        - Asset Graph
        - Asset Graphs
      tools: 4
    - name: Censys Asset Graph — Assets
      file: capabilities/asset-graph-assets.yaml
      description: 'Censys Asset Graph — Assets. 2 operation(s). Lead operation: Censys List Assets. Self-contained Naftiko capability covering one Censys business surface.'
      apis:
        - Censys
        - Asset Graph
        - Assets
      tools: 2
    - name: Censys Asset Graph — Excluded Assets
      file: capabilities/asset-graph-excluded-assets.yaml
