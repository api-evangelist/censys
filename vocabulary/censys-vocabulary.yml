vocabulary: 1.0.0
info:
  provider: Censys
  description: Unified vocabulary for the Censys Platform and Asset Graph APIs covering operational (OpenAPI) and capability (Naftiko) dimensions.
  created: '2026-05-29'
  modified: '2026-05-29'
operational:
  apis:
    - name: Censys Platform API
      namespace: platform
      version: 1.0.103
      baseUrl: https://api.platform.censys.io
      status: active
    - name: Asset Graph API
      namespace: asset-graph
      version: 1.0.12
      baseUrl: https://graph.data.censys.io
      status: active
  resources:
    - name: accounts
      api: platform
      actions:
        - v3
      paths:
        - /v3/accounts/organizations/{organization_id}
        - /v3/accounts/organizations/{organization_id}/audit-log-events
        - /v3/accounts/organizations/{organization_id}/credits
        - /v3/accounts/organizations/{organization_id}/credits/usage
        - /v3/accounts/organizations/{organization_id}/invitations
        - /v3/accounts/organizations/{organization_id}/members
        - /v3/accounts/organizations/{organization_id}/members/{user_id}
        - /v3/accounts/organizations/{organization_id}/members/{user_id}/credits/usage
        - /v3/accounts/users/credits
        - /v3/accounts/users/credits/usage
    - name: asset-graphs
      api: asset-graph
      actions:
        - create
        - delete
        - get
        - list
      paths:
        - /api/v1/asset-graphs
        - /api/v1/asset-graphs/{graph_id}/excluded-assets
        - /api/v1/asset-graphs/{graph_id}/excluded-assets/{excluded_asset_id}
        - /api/v1/asset-graphs/{graph_id}/executions
        - /api/v1/asset-graphs/{graph_id}/executions/{execution_id}
        - /api/v1/asset-graphs/{graph_id}/executions/{execution_id}/assets
        - /api/v1/asset-graphs/{graph_id}/executions/{execution_id}/assets/{asset_id}
        - /api/v1/asset-graphs/{graph_id}/executions/{execution_id}/shards
        - /api/v1/asset-graphs/{graph_id}/seeds
        - /api/v1/asset-graphs/{graph_id}/seeds/{seed_id}
        - /api/v1/asset-graphs/{id}
    - name: collections
      api: platform
      actions:
        - v3
      paths:
        - /v3/collections
        - /v3/collections/{collection_uid}
        - /v3/collections/{collection_uid}/events
        - /v3/collections/{collection_uid}/search/aggregate
        - /v3/collections/{collection_uid}/search/query
    - name: comments
      api: platform
      actions:
        - v3
      paths:
        - /v3/comments
        - /v3/comments/{comment_id}
    - name: global
      api: platform
      actions:
        - v3
      paths:
        - /v3/global/asset/certificate
        - /v3/global/asset/certificate/raw
        - /v3/global/asset/certificate/{certificate_id}
        - /v3/global/asset/certificate/{certificate_id}/raw
        - /v3/global/asset/host
        - /v3/global/asset/host/{host_id}
        - /v3/global/asset/host/{host_id}/observations/services
        - /v3/global/asset/host/{host_id}/timeline
        - /v3/global/asset/webproperty
        - /v3/global/asset/webproperty/{webproperty_id}
        - /v3/global/dns/resolutions/ip/{ip}/bounds
        - /v3/global/dns/resolutions/ip/{ip}/ranges
        - /v3/global/dns/resolutions/{name}/bounds
        - /v3/global/dns/resolutions/{name}/ranges
        - /v3/global/scans/rescan
        - /v3/global/scans/{scan_id}
        - /v3/global/search/aggregate
        - /v3/global/search/convert
        - /v3/global/search/query
    - name: risks
      api: asset-graph
      actions:
        - get
      paths:
        - /api/v1/risks/{risk_id}
    - name: supplychains
      api: platform
      actions:
        - v1
      paths:
        - /v1/supplychains
        - /v1/supplychains/suppliers
        - /v1/supplychains/suppliers/{supplier_id}
    - name: tags
      api: platform
      actions:
        - v3
      paths:
        - /v3/tags
        - /v3/tags/{tag_id}
        - /v3/tags/{tag_id}/assignments
        - /v3/tags/{tag_id}/assignments/{assignment_id}
    - name: threat-hunting
      api: platform
      actions:
        - v3
      paths:
        - /v3/threat-hunting/censeye/jobs
        - /v3/threat-hunting/censeye/jobs/{job_id}
        - /v3/threat-hunting/censeye/jobs/{job_id}/results
        - /v3/threat-hunting/certificate/{certificate_id}/observations/hosts
        - /v3/threat-hunting/host/{ip}/observations/endpoints
        - /v3/threat-hunting/host/{ip}/observations/fingerprints
        - /v3/threat-hunting/host/{ip}/observations/threats
        - /v3/threat-hunting/scans/discovery
        - /v3/threat-hunting/scans/{scan_id}
        - /v3/threat-hunting/threats
        - /v3/threat-hunting/value-counts
        - /v3/threat-hunting/web/{webproperty_id}/observations/threats
  actions:
    - name: create
      methods:
        - POST
      pattern: write
    - name: delete
      methods:
        - DELETE
      pattern: destructive
    - name: get
      methods:
        - GET
      pattern: read
    - name: list
      methods:
        - GET
      pattern: read
    - name: v1
      methods:
        - DELETE
        - GET
        - POST
      pattern: read
    - name: v3
      methods:
        - DELETE
        - GET
        - PATCH
        - POST
        - PUT
      pattern: read
