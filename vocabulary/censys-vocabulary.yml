  personas:
    - id: security-researcher
      name: Security Researcher
      description: Uses Censys for academic and OSINT internet measurement research.
    - id: threat-hunter
      name: Threat Hunter
      description: Pivots across hosts/certs/services to track adversary infrastructure.
    - id: soc-analyst
      name: SOC Analyst
      description: Enriches alerts in SIEM/SOAR with Censys host and certificate context.
    - id: asm-operator
      name: ASM Operator
      description: Maintains the external attack surface inventory and remediation pipeline.
    - id: platform-admin
      name: Platform Administrator
      description: Manages Censys org, members, credits, and audit logs.
  domains:
    - name: Asset Intelligence
      description: Hosts, certificates, web properties, DNS lookups.
    - name: Threat Hunting
      description: CensEye, fingerprints, threats, discovery scans.
    - name: Adversary Investigation
      description: Cert→host and host→endpoint pivots, value counts, threat lookups.
    - name: Collections
      description: Saved queries, aggregations, and event subscriptions.
    - name: Asset Graph
      description: Graph definition, execution, exclusions, and risk findings.
    - name: Account Management
      description: Org, members, invitations, credits, audit logs.
    - name: Supply Chain
      description: Supplier registry and supply-chain risk.
    - name: Tags and Comments
      description: Cross-asset annotation surface.
  binds:
    - name: CENSYS_PERSONAL_ACCESS_TOKEN
      description: Personal Access Token used as HTTP bearer auth across all Censys Platform and Asset Graph capabilities.
