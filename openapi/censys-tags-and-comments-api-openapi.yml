          format: uuid
          type: string
      - description: Filter comments created before this RFC3339 timestamp.
        explode: false
        in: query
        name: created_before
        schema:
          description: Filter comments created before this RFC3339 timestamp.
          format: date-time
          type: string
      - description: Filter comments created after this RFC3339 timestamp.
        explode: false
        in: query
        name: created_after
        schema:
          description: Filter comments created after this RFC3339 timestamp.
