          - private
          - shared
          type: string
      required:
      - name
      - privacy
      type: object
    CreateCommentInputBody:
      additionalProperties: false
      properties:
        asset_id:
          description: The identifier of the asset (host IP, certificate SHA-256 fingerprint, or web property hostname:port).
          examples:
          - 8.8.8.8
          - 3daf2843a77b6f4e6af43cd9b6f6746053b8c928e056e8a724808db8905a94cf
          - platform.censys.io:443
          type: string
        body:
          description: The comment body text.
          maxLength: 10000
          minLength: 1
          type: string
      required:
      - asset_id
      - body
      type: object
