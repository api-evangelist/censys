  schemas:
    ResponseEnvelopeTagAssignment:
      additionalProperties: false
      properties:
        result:
          $ref: '#/components/schemas/TagAssignment'
      type: object
    CreateTagInputBody:
      additionalProperties: false
      properties:
        description:
          description: A human-readable description of the tag.
          maxLength: 1000
          type: string
