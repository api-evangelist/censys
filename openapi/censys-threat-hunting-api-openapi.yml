components:
  schemas:
    ThreatsListResponse:
      additionalProperties: false
      properties:
        threats:
          description: List of active threats observed on the platform.
          items:
            $ref: '#/components/schemas/ThreatListItem'
          type:
          - array
          - 'null'
      required:
      - threats
      type: object
    TrackedScan_Task:
      additionalProperties: false
      properties:
        description:
          type: string
        status:
          enum:
          - ''
          - scanning
          - scanned
          - rejected
          - timed_out
          - completed
          - ignored
          type: string
        update_time:
          type: string
      type: object
    CountCondition:
      additionalProperties: false
      properties:
        field_value_pairs:
          description: Field-value pairs to count matches for. Must target fields from the same nested object and may contain at most 5 pairs per group.
          items:
            $ref: '#/components/schemas/FieldValuePair'
          type:
          - array
          - 'null'
      required:
      - field_value_pairs
      type: object
    TrackedScan_ScanTarget_HostnamePort:
      additionalProperties: false
      properties:
        hostname:
          type: string
        port:
          format: int32
          minimum: 0
          type: integer
      type: object
    ThreatOnHostRange:
      additionalProperties: false
      properties:
        end_time:
          description: When the threat was last observed
          format: date-time
          type: string
        ip:
          description: IP address where the threat was observed
          type: string
        port:
          description: Port number where the threat was observed
          type: string
        protocol:
          description: Application protocol (e.g., HTTP, HTTPS)
          type: string
        start_time:
          description: When the threat was first observed
          format: date-time
          type: string
        threat_name:
          description: Name of the detected threat
          type: string
        transport_protocol:
          description: Transport protocol (TCP or UDP)
          type: string
      required:
      - threat_name
      - ip
      - port
      - protocol
      - transport_protocol
      - start_time
      - end_time
      type: object
    HashObservationOnHostRange:
      additionalProperties: false
      properties:
        end_time:
          description: When the observation was last seen
          format: date-time
          type: string
        ip:
          description: IP address of the host
          type: string
        observation_type:
          description: Observation type selected in the request
          type: string
        observation_value:
          description: Observed value for the selected observation type
          type: string
        port:
          description: Port number
          type: string
        start_time:
          description: When the observation was first seen
          format: date-time
          type: string
        transport_protocol:
          description: Transport protocol when present for the selected timeline
          type: string
      required:
      - ip
      - port
      - observation_type
      - observation_value
      - start_time
      - end_time
      type: object
    ThreatListItem:
      additionalProperties: false
      properties:
        added_at:
          description: The date and time when the threat was added.
          format: date-time
          type: string
        count:
          description: Total count of assets affected by this threat.
          format: int64
          type: integer
        description:
          description: Detailed description of the threat.
          type: string
        host_count:
          description: Number of hosts affected by this threat.
          format: int64
          type: integer
        id:
          description: Unique identifier of the threat.
          type: string
        name:
          description: Human-readable name of the threat.
          type: string
        references:
          description: External reference links for the threat.
          items:
            $ref: '#/components/schemas/ThreatReference'
          type:
          - array
          - 'null'
        web_count:
          description: Number of web properties affected by this threat.
          format: int64
          type: integer
      required:
      - id
      - count
      - host_count
      - web_count
      type: object
    CenseyeJobsListResponse:
      additionalProperties: false
      properties:
        jobs:
          description: List of CensEye jobs.
          items:
            $ref: '#/components/schemas/CenseyeJob'
          type:
          - array
          - 'null'
        next_page_token:
          description: Token to retrieve the next page of jobs.
          type: string
      required:
      - jobs
      type: object
    ResponseEnvelopeCenseyeResultsResponse:
      additionalProperties: false
      properties:
        result:
          $ref: '#/components/schemas/CenseyeResultsResponse'
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
