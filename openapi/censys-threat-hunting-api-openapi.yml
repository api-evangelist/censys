    CenseyeResultsResponse:
      additionalProperties: false
      properties:
        next_page_token:
          description: Token to retrieve the next page of results.
          type: string
        results:
          description: List of count results.
          items:
            $ref: '#/components/schemas/CenseyeResult'
          type:
          - array
          - 'null'
      required:
      - results
