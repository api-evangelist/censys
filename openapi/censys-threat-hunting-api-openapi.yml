      - PersonalAccessToken: []
      summary: Censys Get Host History for a Certificate
      tags:
      - Threat Hunting
      x-speakeasy-name-override: GetHostObservationsWithCertificate
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
